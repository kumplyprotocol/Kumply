name: KUMPLY CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ── Contracts: compile + test ─────────────────────────────────
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm --filter @kumply/contracts compile

      - name: Run contract tests
        run: pnpm --filter @kumply/contracts test

  # ── SDK: build + test ─────────────────────────────────────────
  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @kumply/sdk build

      - name: Run SDK tests
        run: pnpm --filter @kumply/sdk test

  # ── API: build ────────────────────────────────────────────────
  api:
    name: API
    runs-on: ubuntu-latest
    needs: [sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK (dependency)
        run: pnpm --filter @kumply/sdk build

      - name: Build API
        run: pnpm --filter @kumply/api build

      - name: Run API tests
        run: pnpm --filter @kumply/api test

  # ── Frontend: build ───────────────────────────────────────────
  web:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK (dependency)
        run: pnpm --filter @kumply/sdk build

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_CONTRACT_ATTESTATION_STORE: '0x9Bbb0797EA92277c268fe7E45BdB16b70E787d76'
          NEXT_PUBLIC_CONTRACT_COMPLIANCE_GATE: '0x3Bf8F8ea2573Eb3f386aDF72D191869c4827062B'
          NEXT_PUBLIC_VERIFIER_ADDRESS: '0xD65042534CE80fcb641fd6Eb99a16eBF6C0cd076'
          NEXT_PUBLIC_FUJI_RPC_URL: 'https://api.avax-test.network/ext/bc/C/rpc'
          NEXT_PUBLIC_CHAIN_ID: '43113'
